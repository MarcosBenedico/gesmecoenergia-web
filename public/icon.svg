<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="120" />

  <!-- Rayo de energía (estilizado) -->
  <g transform="translate(256, 150)">
    <!-- Rayo superior -->
    <polygon points="0,-60 30,-10 0,20 -30,-10" fill="white" opacity="0.9"/>

    <!-- Círculo central -->
    <circle cx="0" cy="80" r="50" fill="white" opacity="0.3"/>

    <!-- Rayo inferior -->
    <polygon points="0,50 25,120 0,150 -25,120" fill="white" opacity="0.85"/>
  </g>

  <!-- Texto "G" (Gesmeco) -->
  <text x="256" y="380" font-size="120" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">G</text>
</svg>
